<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calma Natural - Asistente Virtual</title>
<link rel="icon" type="image/jpeg" href="logo-calma-natural.jpg">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  body {
    background: linear-gradient(135deg, #e8dfd3 0%, #d4c4b0 100%);
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center; padding: 20px;
  }
  .header { text-align: center; margin-bottom: 20px; color: #5c4a3a; }
  .header h1 { font-family: 'Georgia', serif; font-size: 26px; margin-bottom: 6px; }
  .header p { font-size: 13px; opacity: 0.8; }
  .phone {
    width: 100%; max-width: 400px; height: 720px;
    background: #efeae2; border-radius: 30px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    overflow: hidden; display: flex; flex-direction: column;
    border: 8px solid #2a2a2a;
  }
  .chat-header {
    background: #075e54; color: white;
    padding: 12px 15px; display: flex; align-items: center; gap: 12px;
  }
  .avatar {
    width: 42px; height: 42px; border-radius: 50%;
    background: white; background-image: url('logo-calma-natural.jpg');
    background-size: cover; background-position: center;
    flex-shrink: 0; border: 2px solid rgba(255,255,255,0.5);
  }
  .chat-info h3 { font-size: 15px; font-weight: 600; }
  .chat-info p { font-size: 11px; opacity: 0.8; }
  .home-btn {
    margin-left: auto; background: rgba(255,255,255,0.15);
    border: none; color: white; width: 34px; height: 34px;
    border-radius: 50%; cursor: pointer; font-size: 15px;
    display: flex; align-items: center; justify-content: center; transition: background 0.2s;
  }
  .home-btn:hover { background: rgba(255,255,255,0.3); }
  .messages {
    flex: 1; overflow-y: auto; padding: 12px;
    background-color: #efeae2;
    background-image: radial-gradient(circle at 20% 30%, rgba(212,175,127,0.08) 0%, transparent 50%),
                      radial-gradient(circle at 80% 70%, rgba(139,111,71,0.08) 0%, transparent 50%);
  }
  .msg {
    max-width: 82%; padding: 8px 11px; margin-bottom: 3px;
    border-radius: 8px; font-size: 13.5px; line-height: 1.45;
    word-wrap: break-word; animation: fadeIn 0.25s ease-in;
  }
  @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
  .msg.bot { background: white; margin-right: auto; border-top-left-radius: 2px; }
  .msg.user { background: #d9fdd3; margin-left: auto; border-top-right-radius: 2px; }
  .msg-container { display: flex; flex-direction: column; margin-bottom: 6px; }
  .msg-container.user-side { align-items: flex-end; }
  .msg-time { font-size: 10px; color: #999; margin-top: 2px; padding: 0 4px; text-align: right; }
  .msg.bot.img-msg { padding: 3px; max-width: 72%; overflow: hidden; }
  .msg.bot.img-msg img { width: 100%; border-radius: 6px; display: block; cursor: pointer; }

  /* Tip card */
  .tip-card {
    background: linear-gradient(135deg, #fffbea, #fef3c7);
    border-left: 3px solid #f59e0b; padding: 9px 11px;
    border-radius: 8px; font-size: 13px; color: #78350f;
    margin-bottom: 4px; animation: fadeIn 0.25s ease-in; max-width: 82%;
  }

  /* Status card (simulación de confirmación) */
  .status-card {
    background: white; border-radius: 10px; padding: 12px;
    margin-top: 6px; font-size: 12.5px;
  }
  .status-card .status-row {
    display: flex; align-items: center; gap: 8px;
    padding: 5px 0; border-bottom: 1px solid #f0f0f0;
  }
  .status-card .status-row:last-child { border-bottom: none; }
  .status-card .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .dot-pending { background: #f59e0b; animation: pulse 1.2s infinite; }
  .dot-done { background: #22c55e; }
  .dot-wait { background: #d1d5db; }
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }

  /* Voucher card */
  .voucher-card {
    background: linear-gradient(135deg, #f0fdf4, #dcfce7);
    border: 1px solid #86efac; border-radius: 10px;
    padding: 12px; margin-top: 6px; font-size: 13px; color: #14532d;
  }
  .voucher-card .v-title { font-weight: bold; font-size: 14px; margin-bottom: 8px; }
  .voucher-card .v-row { padding: 3px 0; color: #166534; }

  /* Bank card */
  .bank-card {
    background: linear-gradient(135deg, #eff6ff, #dbeafe);
    border: 1px solid #93c5fd; border-radius: 10px;
    padding: 12px; margin-top: 6px; font-size: 13px; color: #1e3a5f;
  }
  .bank-card .b-title { font-weight: bold; margin-bottom: 8px; color: #1d4ed8; }
  .bank-card .b-row { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid rgba(147,197,253,0.4); }
  .bank-card .b-row:last-child { border-bottom: none; }
  .bank-card .b-label { opacity: 0.7; }
  .bank-card .b-value { font-weight: 600; }

  /* Summary */
  .summary-card {
    background: linear-gradient(135deg, #f5ebe0, #e8d5b7);
    padding: 12px; border-radius: 10px; margin-top: 6px;
    font-size: 13px; color: #5c4a3a;
  }
  .summary-card .title { font-weight: bold; margin-bottom: 7px; font-family: 'Georgia', serif; font-size: 14px; }
  .summary-card .row { display: flex; justify-content: space-between; padding: 3px 0; }
  .summary-card .total { border-top: 1px solid #b08060; margin-top: 6px; padding-top: 6px; font-weight: bold; }

  /* Calendar */
  .calendar-card {
    background: white; border-left: 4px solid #4285f4;
    padding: 11px; margin-top: 6px; border-radius: 8px; font-size: 12.5px;
  }
  .calendar-card .c-title { color: #4285f4; font-size: 11px; margin-bottom: 5px; font-weight: 600; }
  .calendar-card .c-event { font-weight: bold; color: #222; margin-bottom: 4px; }
  .calendar-card .c-detail { color: #666; margin-bottom: 2px; }

  /* Options */
  .options { display: flex; flex-direction: column; gap: 5px; margin-top: 7px; align-self: flex-start; max-width: 92%; }
  .option-btn {
    background: white; border: 1px solid #d4af7f; color: #5c4a3a;
    padding: 9px 11px; border-radius: 8px; cursor: pointer; font-size: 13px;
    text-align: left; transition: all 0.18s;
  }
  .option-btn:hover { background: #d4af7f; color: white; }
  .option-btn.home { background: #f5ebe0; border-color: #8b6f47; font-style: italic; text-align: center; margin-top: 3px; }
  .option-btn.home:hover { background: #8b6f47; color: white; }
  .option-btn.voucher-btn { background: #f0fdf4; border-color: #22c55e; color: #14532d; }
  .option-btn.voucher-btn:hover { background: #22c55e; color: white; }
  .option-btn.combo-btn { background: #faf5ff; border-color: #a855f7; color: #581c87; }
  .option-btn.combo-btn:hover { background: #a855f7; color: white; }

  /* Input */
  .input-area { background: #f0f2f5; padding: 10px; display: flex; gap: 8px; align-items: center; }
  .input-area input {
    flex: 1; border: none; background: white; padding: 9px 14px;
    border-radius: 20px; font-size: 14px; outline: none;
  }
  .input-area button {
    background: #075e54; color: white; border: none;
    width: 40px; height: 40px; border-radius: 50%; cursor: pointer; font-size: 18px;
  }

  /* Typing */
  .typing { display: inline-block; padding: 10px 14px; background: white; border-radius: 8px; border-top-left-radius: 2px; }
  .typing span {
    display: inline-block; width: 6px; height: 6px;
    background: #aaa; border-radius: 50%; margin: 0 1px;
    animation: bounce 1.4s infinite ease-in-out;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,60%,100%{transform:translateY(0);opacity:.5;} 30%{transform:translateY(-7px);opacity:1;} }

  /* Controls */
  .controls { margin-top: 18px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
  .control-btn { background: #5c4a3a; color: white; border: none; padding: 9px 18px; border-radius: 20px; cursor: pointer; font-size: 13px; }
  .control-btn:hover { background: #8b6f47; }

  /* Modal */
  .img-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 100; align-items: center; justify-content: center; padding: 20px; cursor: pointer; }
  .img-modal.active { display: flex; }
  .img-modal img { max-width: 100%; max-height: 90vh; border-radius: 10px; }
</style>
</head>
<body>

<div class="header">
  <h1>🌿 Calma Natural</h1>
  <p>Asistente virtual · Demo completa con flujo de confirmación</p>
</div>

<div class="phone">
  <div class="chat-header">
    <div class="avatar"></div>
    <div class="chat-info">
      <h3>Calma Natural</h3>
      <p>en línea · responde en minutos</p>
    </div>
    <button class="home-btn" onclick="goHome(true)" title="Volver al inicio">🏠</button>
  </div>
  <div class="messages" id="messages"></div>
  <div class="input-area">
    <input type="text" id="userInput" placeholder="Escribí un mensaje..." />
    <button onclick="sendUserMessage()">➤</button>
  </div>
</div>

<div class="controls">
  <button class="control-btn" onclick="resetChat()">🔄 Reiniciar demo</button>
</div>

<div class="img-modal" id="imgModal" onclick="closeModal()">
  <img id="modalImg" src="" alt="">
</div>

<script>
const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('userInput');

// ─── Configuración ────────────────────────────────────────────────
const SABADO_PERMITIDAS = ['sincronizado','piedras','vibracional'];
const TERAPIAS_INDIVIDUALES = ['californiano','drenaje','reflexologia','kaolift','embarazadas'];

// Horarios: mañana 8-13, tarde 15-19 (bloques de 1:30hs)
const HORARIOS_MANANA = ['8:00','9:30','11:00','12:30'];
const HORARIOS_TARDE  = ['15:00','16:30','18:00'];

const BANK_DATA = {
  cbu:     '⬛ Acá va el CBU',
  alias:   '⬛ Acá va el alias',
  titular: '⬛ Acá va el nombre del titular',
  banco:   '⬛ Acá va el banco'
};

const therapies = {
  californiano: { name:'Masaje Californiano',         price:80000,  duration:60, img:'terapias/californiano.jpg' },
  sincronizado: { name:'Masaje Sincronizado',          price:130000, duration:60, img:'terapias/sincronizado.jpg' },
  drenaje:      { name:'Drenaje Linfático',            price:65000,  duration:60, img:'terapias/drenaje.jpg' },
  vibracional:  { name:'Terapia Vibracional',          price:140000, duration:75, img:'terapias/vibracional.jpg' },
  reflexologia: { name:'Reflexología',                 price:70000,  duration:60, img:'terapias/reflexologia.jpg' },
  parejas:      { name:'Masaje para Parejas',          price:170000, duration:60, img:'terapias/parejas.jpg' },
  kaolift:      { name:'Kaolift',                      price:80000,  duration:60, img:'terapias/kaolift.jpg' },
  piedras:      { name:'Terapia con Piedras Calientes',price:150000, duration:75, img:'terapias/piedras.jpg' },
  embarazadas:  { name:'Masaje para Embarazadas',      price:70000,  duration:60, img:'terapias/embarazadas.jpg' }
};

const combos = [
  { id:'c1', name:'Bienestar Total',       t1:'californiano', t2:'reflexologia', desc:'Relajación profunda + renovación energética desde los pies', precio: therapies.californiano.price + therapies.reflexologia.price, duracion: 120 },
  { id:'c2', name:'Belleza y Calma',       t1:'kaolift',      t2:'californiano', desc:'Lifting facial + masaje corporal relajante completo',        precio: therapies.kaolift.price + therapies.californiano.price,      duracion: 120 },
  { id:'c3', name:'Drenaje + Reflexología',t1:'drenaje',      t2:'reflexologia', desc:'Eliminación de toxinas + estimulación de puntos vitales',    precio: therapies.drenaje.price + therapies.reflexologia.price,      duracion: 120 },
  { id:'c4', name:'Piedras + Vibracional', t1:'piedras',      t2:'vibracional',  desc:'Calor profundo + armonización con cuencos tibetanos',        precio: therapies.piedras.price + therapies.vibracional.price,       duracion: 150 },
];

const vouchers = [
  { id:'v1', terapia:'californiano', validez:'3 meses' },
  { id:'v2', terapia:'sincronizado', validez:'3 meses' },
  { id:'v3', terapia:'drenaje',      validez:'3 meses' },
  { id:'v4', terapia:'reflexologia', validez:'3 meses' },
  { id:'v5', terapia:'kaolift',      validez:'3 meses' },
  { id:'v6', terapia:'piedras',      validez:'3 meses' },
  { id:'v7', terapia:'vibracional',  validez:'3 meses' },
];

// ─── State ────────────────────────────────────────────────────────
let state = { step:'start', booking:{} };

// ─── Utilidades ───────────────────────────────────────────────────
function getTime() {
  const d = new Date();
  return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');
}
function isSabado(s) { return s && (s.toLowerCase().includes('sábado')||s.toLowerCase().includes('sabado')); }
function isManana(t) { return t && parseInt(t.split(':')[0]) < 13; }
function formatPrice(p) { return '$'+p.toLocaleString('es-AR'); }

// Fecha 3 meses adelante
function fechaVencimiento() {
  const d = new Date(); d.setMonth(d.getMonth()+3);
  const meses = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  return `${d.getDate()} de ${meses[d.getMonth()]} de ${d.getFullYear()}`;
}

const mainMenuOptions = [
  { label:'✨ Ver terapias y precios',          value:'ver_terapias' },
  { label:'📅 Reservar un turno',               value:'reservar' },
  { label:'🎟️ Tengo un voucher',               value:'tengo_voucher_directo' },
  { label:'🛍️ Comprar voucher de regalo',       value:'comprar_voucher_directo' },
  { label:'ℹ️ Info del lugar',                  value:'info' }
];

const therapyListOptions = [
  { label:'💆 Masaje Californiano - $80.000',        value:'californiano' },
  { label:'✨ Masaje Sincronizado - $130.000 ⭐',    value:'sincronizado' },
  { label:'💧 Drenaje Linfático - $65.000',          value:'drenaje' },
  { label:'🎵 Terapia Vibracional - $140.000',       value:'vibracional' },
  { label:'👣 Reflexología - $70.000',               value:'reflexologia' },
  { label:'💑 Masaje para Parejas - $170.000',       value:'parejas' },
  { label:'🌸 Kaolift (facial) - $80.000',           value:'kaolift' },
  { label:'🔥 Piedras Calientes - $150.000',         value:'piedras' },
  { label:'🤰 Masaje Embarazadas - $70.000',         value:'embarazadas' },
  { label:'💜 Combo 2 terapias (2hs) ✨',            value:'ir_combos' }
];

function withHome(opts) {
  if (!opts) return [{ label:'🏠 Volver al inicio', value:'menu' }];
  return opts.some(o=>o.value==='menu') ? opts : [...opts, { label:'🏠 Volver al inicio', value:'menu' }];
}

// ─── Render helpers ───────────────────────────────────────────────
function addUserMessage(text) {
  const c = document.createElement('div'); c.className='msg-container user-side';
  const m = document.createElement('div'); m.className='msg user'; m.textContent=text;
  const t = document.createElement('div'); t.className='msg-time'; t.textContent=getTime()+' ✓✓';
  c.appendChild(m); c.appendChild(t); messagesEl.appendChild(c);
  messagesEl.scrollTop=messagesEl.scrollHeight;
}

function showTyping() {
  const t=document.createElement('div'); t.id='typing-indicator'; t.className='msg-container';
  t.innerHTML='<div class="typing"><span></span><span></span><span></span></div>';
  messagesEl.appendChild(t); messagesEl.scrollTop=messagesEl.scrollHeight;
}
function removeTyping() { const t=document.getElementById('typing-indicator'); if(t)t.remove(); }

function addBotMessage(text, options=null, extra=null, addHome=true, delay=800) {
  showTyping();
  setTimeout(()=>{
    removeTyping();
    const c=document.createElement('div'); c.className='msg-container';
    const m=document.createElement('div'); m.className='msg bot'; m.innerHTML=text;
    c.appendChild(m);
    if(extra){ const e=document.createElement('div'); e.innerHTML=extra; e.style.cssText='padding:0;background:transparent;'; c.appendChild(e); }
    const finalOpts = addHome ? withHome(options) : options;
    if(finalOpts){
      const op=document.createElement('div'); op.className='options';
      finalOpts.forEach(o=>{
        const b=document.createElement('button');
        b.className='option-btn'
          +(o.value==='menu'?' home':'')
          +(o.value&&o.value.startsWith('voucher_')?' voucher-btn':'')
          +(o.value&&o.value.startsWith('combo_')?' combo-btn':'');
        b.textContent=o.label;
        b.onclick=()=>handleChoice(o.value,o.label);
        op.appendChild(b);
      });
      c.appendChild(op);
    }
    const t=document.createElement('div'); t.className='msg-time'; t.textContent=getTime();
    c.appendChild(t); messagesEl.appendChild(c); messagesEl.scrollTop=messagesEl.scrollHeight;
  }, delay);
}

function addBotImage(src) {
  return new Promise(res=>{
    showTyping();
    setTimeout(()=>{
      removeTyping();
      const c=document.createElement('div'); c.className='msg-container';
      const m=document.createElement('div'); m.className='msg bot img-msg';
      const img=document.createElement('img'); img.src=src; img.alt=''; img.onclick=()=>openModal(src);
      m.appendChild(img); c.appendChild(m);
      const t=document.createElement('div'); t.className='msg-time'; t.textContent=getTime();
      c.appendChild(t); messagesEl.appendChild(c); messagesEl.scrollTop=messagesEl.scrollHeight;
      res();
    },600);
  });
}

function addTip(text) {
  const c=document.createElement('div'); c.className='msg-container';
  const t=document.createElement('div'); t.className='tip-card'; t.innerHTML=text;
  c.appendChild(t); messagesEl.appendChild(c); messagesEl.scrollTop=messagesEl.scrollHeight;
}

function openModal(src){ document.getElementById('modalImg').src=src; document.getElementById('imgModal').classList.add('active'); }
function closeModal(){ document.getElementById('imgModal').classList.remove('active'); }

// ─── Simulación de confirmación (Opción D) ────────────────────────
function showConfirmationFlow() {
  const b = state.booking;
  const esManana = isManana(b.time);

  // 1. Mensaje inicial
  addBotMessage(
    '📨 <b>¡Solicitud recibida!</b><br><br>Le estamos avisando a las terapeutas para confirmar tu turno. Te respondemos en unos minutos 🌿',
    null, null, false, 800
  );

  // 2. Mostrar estado "enviando"
  setTimeout(()=>{
    showTyping();
    setTimeout(()=>{
      removeTyping();
      const statusHtml = `
        <div class="status-card">
          <div class="status-row"><div class="dot dot-done"></div><span>Solicitud enviada a Calma Natural ✓</span></div>
          <div class="status-row"><div class="dot dot-pending"></div><span>Esperando confirmación de disponibilidad...</span></div>
          <div class="status-row"><div class="dot dot-wait"></div><span>Evento en calendario pendiente</span></div>
        </div>`;
      const c=document.createElement('div'); c.className='msg-container';
      const m=document.createElement('div'); m.className='msg bot'; m.innerHTML='🔄 <b>Estado de tu reserva:</b>';
      const e=document.createElement('div'); e.innerHTML=statusHtml; e.style.cssText='padding:0;background:transparent;';
      const t=document.createElement('div'); t.className='msg-time'; t.textContent=getTime();
      c.appendChild(m); c.appendChild(e); c.appendChild(t);
      messagesEl.appendChild(c); messagesEl.scrollTop=messagesEl.scrollHeight;
    }, 900);
  }, 2000);

  // 3. Gachi confirma (simulado)
  setTimeout(()=>{
    showTyping();
    setTimeout(()=>{
      removeTyping();
      const statusHtml2 = `
        <div class="status-card">
          <div class="status-row"><div class="dot dot-done"></div><span>Solicitud enviada a Calma Natural ✓</span></div>
          <div class="status-row"><div class="dot dot-done"></div><span>✅ Gachi confirmó disponibilidad</span></div>
          <div class="status-row"><div class="dot dot-pending"></div><span>Creando evento en calendario...</span></div>
        </div>`;
      const c=document.createElement('div'); c.className='msg-container';
      const m=document.createElement('div'); m.className='msg bot'; m.innerHTML='✅ <b>¡Turno confirmado!</b>';
      const e=document.createElement('div'); e.innerHTML=statusHtml2; e.style.cssText='padding:0;background:transparent;';
      const t=document.createElement('div'); t.className='msg-time'; t.textContent=getTime();
      c.appendChild(m); c.appendChild(e); c.appendChild(t);
      messagesEl.appendChild(c); messagesEl.scrollTop=messagesEl.scrollHeight;
    }, 900);
  }, 5000);

  // 4. Resumen final + calendario
  setTimeout(()=>{
    const summary = `
      <div class="summary-card">
        <div class="title">🌿 Resumen de tu turno</div>
        <div class="row"><span>Cliente:</span><b>${b.name}</b></div>
        <div class="row"><span>Terapia:</span><b>${b.therapy.name}</b></div>
        <div class="row"><span>Fecha:</span><b>${b.date}</b></div>
        <div class="row"><span>Horario:</span><b>${b.time} hs</b></div>
        <div class="row"><span>Duración:</span><b>${b.therapy.duration} min</b></div>
        ${b.preferences ? `<div class="row"><span>Nota:</span><b>${b.preferences}</b></div>` : ''}
        <div class="row total"><span>Total:</span><span>${formatPrice(b.therapy.price)}</span></div>
      </div>`;

    const calCard = `
      <div class="calendar-card">
        <div class="c-title">📅 Google Calendar · Evento creado automáticamente</div>
        <div class="c-event">${b.therapy.name}</div>
        <div class="c-detail">📆 ${b.date} · 🕐 ${b.time} hs</div>
        <div class="c-detail">📍 Buenos Aires 174, Neuquén</div>
        <div class="c-detail">⏱️ ${b.therapy.duration} minutos</div>
        <div class="c-detail" style="margin-top:5px;color:#4285f4;">
          🔔 Recordatorio: ${esManana ? 'el día anterior por la tarde' : 'el mismo día a la mañana'}
        </div>
      </div>`;

    addBotMessage(

// ─── Flujo principal ──────────────────────────────────────────────
function handleChoice(value, label) {
  if(value==='menu'){ addUserMessage(label); setTimeout(()=>goHome(false),300); return; }
  addUserMessage(label);

  // Handler especial para bloqueo de sábado
  if(state.step==='sabado_block'){
    const map={switch_sincronizado:'sincronizado',switch_piedras:'piedras',switch_vibracional:'vibracional'};
    if(map[value]){
      const k=map[value];
      state.booking.therapy=therapies[k]; state.booking.therapyKey=k; state.booking.date='Este sábado';
      state.step='ask_time';
      addBotMessage(`Perfecto, cambiamos a <b>${therapies[k].name}</b> para el sábado 🗓️<br>¿En qué horario te queda mejor?`, buildTimeOptions('saturday'));
    } else if(value==='other_day'){
      state.step='wait_custom_date';
      addBotMessage(`Claro, ¿qué día preferís para <b>${state.booking.therapy.name}</b>? 📅<br><br>Escribí la fecha (ej: "martes 24 de junio") o elegí:`,
        [{label:'⚡ Lo antes posible',value:'lo_antes_posible'}]);
    }
    return;
  }

  // Botones de fecha rápida que pueden venir desde wait_custom_date
  if((value==='lo_antes_posible'||value==='saturday') && (state.step==='wait_custom_date'||state.step==='ask_date')){
    setTimeout(()=>handleDateChoice(value), 300);
    return;
  }

  setTimeout(()=>processChoice(value), 300);
}

function buildTimeOptions(dateVal) {
  const esSab = dateVal==='saturday' || (dateVal && (dateVal.toLowerCase().includes('sábado') || dateVal.toLowerCase().includes('sabado')));
  // Terapias que requieren 2 personas → solo tarde
  const soloTarde = ['sincronizado','vibracional','piedras','combo'].includes(state.booking.therapyKey);
  const opts = [];
  if(!esSab && !soloTarde) HORARIOS_MANANA.forEach(h=>opts.push({label:`🌅 ${h} hs`,value:h}));
  if(esSab && !soloTarde) opts.push({label:'🌅 10:00 hs',value:'10:00'}); // sábado mañana solo terapias individuales
  HORARIOS_TARDE.forEach(h=>opts.push({label:`🌇 ${h} hs`,value:h}));
  return opts;
}

function processChoice(value) {
  switch(state.step){
    case 'welcome':
      if(value==='ver_terapias'){ state.step='therapy_list'; addBotMessage('✨ Estas son nuestras terapias. Tocá la que te interese:', therapyListOptions); }
      else if(value==='reservar'){ state.step='therapy_list'; showTherapyList(); }
      else if(value==='vouchers'){ state.step='vouchers_menu'; showVouchersMenu(); }
      else if(value==='tengo_voucher_directo'){ showTengoVoucher(); }
      else if(value==='comprar_voucher_directo'){ state.step='vouchers_list'; showVouchersList(); }
      else if(value==='info'){ showInfo(); }
      break;

    case 'therapy_list':
      if(value==='ir_combos'){ state.step='combos_list'; showCombosList(); break; }
      if(therapies[value]){
        state.booking.therapy=therapies[value]; state.booking.therapyKey=value;
        state.step='therapy_detail'; showTherapyDetail(therapies[value],value);
      }
      break;

    case 'therapy_detail':
      if(value==='reservar'){ state.step='ask_date'; showAskDate(); }
      else if(value==='volver'){ state.step='therapy_list'; showTherapyList(); }
      break;

    case 'combos_list':
      const combo=combos.find(c=>c.id===value);
      if(combo){ state.booking.combo=combo; state.step='combo_detail'; showComboDetail(combo); }
      break;

    case 'combo_detail':
      if(value==='reservar_combo'){ state.booking.therapy={ name:state.booking.combo.name, price:state.booking.combo.precio, duration:state.booking.combo.duracion, img:null }; state.booking.therapyKey='combo'; state.step='ask_date'; showAskDate(); }
      else if(value==='volver_combos'){ state.step='combos_list'; showCombosList(); }
      break;

    case 'ask_date': handleDateChoice(value); break;
    case 'ask_time':
      state.booking.time=value; state.step='ask_preferences';
      addBotMessage('¿Tenés alguna preferencia especial para las terapeutas? 🌸',
        [{label:'💪 Busco más presión / estoy muy contracturada',value:'pref_presion'},
         {label:'🌸 Prefiero tacto muy suave',value:'pref_suave'},
         {label:'✅ Sin preferencias especiales',value:'pref_skip'}]);
      break;

    case 'ask_preferences':
      state.booking.preferences = value==='pref_presion' ? 'Busca más presión / muy contracturada'
                                 : value==='pref_suave'   ? 'Prefiere tacto muy suave'
                                 : null;
      state.step='ask_name';
      addBotMessage('¡Perfecto! Por último, ¿me decís tu nombre completo? 🌸');
      break;

    case 'confirm':
      if(value==='confirmar'){ state.step='done'; showConfirmationFlow(); }
      else if(value==='cancelar'){ goHome(false); }
      break;

    case 'done':
      if(value==='nueva_reserva'){ state.step='therapy_list'; state.booking={}; showTherapyList(); }
      break;

    // Vouchers
    case 'vouchers_menu':
      if(value==='ver_vouchers'){ state.step='vouchers_list'; showVouchersList(); }
      else if(value==='tengo_voucher'){ showTengoVoucher(); }
      break;

    case 'vouchers_list':
      if(value&&value.startsWith('voucher_')){
        const v=vouchers.find(x=>`voucher_${x.id}`===value);
        if(v){ state.selectedVoucher=v; state.step='voucher_detail'; showVoucherDetail(v); }
      }
      break;

    case 'voucher_detail':
      if(value==='quiero_voucher'){ showBankData(state.selectedVoucher); state.step='vouchers_list'; }
      else if(value==='volver_vouchers'){ state.step='vouchers_list'; showVouchersList(); }
      break;

    case 'wait_voucher_code':
      // Handled in sendUserMessage
      break;
  }
}

function handleDateChoice(value) {

    const mesesNombre=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
    const proximo = new Date(); proximo.setDate(proximo.getDate()+1);
    if(proximo.getDay()===0) proximo.setDate(proximo.getDate()+1); // saltar domingo
    const fechaStr=`${diasSemana[proximo.getDay()]} ${proximo.getDate()} de ${mesesNombre[proximo.getMonth()]}`;
    state.booking.date = fechaStr;
    state.step = 'ask_time';

      `🔍 Buscando disponibilidad...<br><br>✅ El próximo turno disponible sería el <b>${fechaStr}</b> 🗓️<br><br>¿En qué horario te queda mejor?`,
      buildTimeOptions('weekday')
    );
    return;
  }

  if(value==='saturday'){
    if(!SABADO_PERMITIDAS.includes(state.booking.therapyKey) && state.booking.therapyKey!=='combo'){
      state.step='sabado_block';
      addBotMessage('⚠️ Los sábados solo realizamos <b>Sincronizado, Piedras Calientes y Terapia Vibracional</b>.<br>¿Qué preferís?',

         {label:'🎵 Cambiar a Terapia Vibracional',value:'switch_vibracional'},
         {label:'📅 Elegir otro día (con mi terapia)',value:'other_day'}],
        null, false);
      return;
    }
    state.booking.date = 'Este sábado';
    state.step = 'ask_time';
    addBotMessage('Perfecto, este sábado 🗓️<br>¿En qué horario te queda mejor?', buildTimeOptions('saturday'));
    return;
  }

  // Fecha escrita por el usuario (llega desde sendUserMessage, no desde aquí)
  state.booking.date = value;
  state.step = 'ask_time';
  addBotMessage(`${value} 🗓️<br>¿En qué horario te queda mejor?`, buildTimeOptions(value));

// ─── Parser de fechas ─────────────────────────────────────────────
function parseDate(text){
  const meses={'enero':0,'ene':0,'febrero':1,'feb':1,'marzo':2,'mar':2,'abril':3,'abr':3,'mayo':4,'may':4,'junio':5,'jun':5,'julio':6,'jul':6,'agosto':7,'ago':7,'septiembre':8,'sep':8,'set':8,'octubre':9,'oct':9,'noviembre':10,'nov':10,'diciembre':11,'dic':11};
  const mn=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  const ds=['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];

  // Días de la semana en español → número (0=dom ... 6=sáb)
  const diasSemanaMap = {
    'domingo':0,'lunes':1,'martes':2,'miercoles':3,'miércoles':3,
    'jueves':4,'viernes':5,'sabado':6,'sábado':6
  };

  const t=text.toLowerCase().trim().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  const hoy=new Date();
  let dia=null,mes=null,anio=hoy.getFullYear();

  // ── NUEVO: solo nombre de día de la semana (ej: "viernes", "el lunes") ──
  // Busca si el texto contiene SOLO un nombre de día sin número
  for(const [nombre, numDia] of Object.entries(diasSemanaMap)){
    // Coincidencia de palabra completa
    const regex = new RegExp(`\\b${nombre}\\b`);
    if(regex.test(t) && !/\d/.test(t)){
      // Calcular el próximo día de esa semana a partir de mañana
      const proximo = new Date(hoy);
      proximo.setDate(proximo.getDate() + 1); // empezamos desde mañana
      let intentos = 0;
      while(proximo.getDay() !== numDia && intentos < 7){
        proximo.setDate(proximo.getDate() + 1);
        intentos++;
      }
      return `${ds[proximo.getDay()]} ${proximo.getDate()} de ${mn[proximo.getMonth()]}`;
    }
  }

  // ── Parser original ──
  const orig = text.toLowerCase().trim();
  const m1=orig.match(/(\d{1,2})\s*(?:de\s+)?([a-záéíóú]+)/);
  if(m1){const d=parseInt(m1[1]);const ms=m1[2].normalize('NFD').replace(/[\u0300-\u036f]/g,'');if(meses[ms]!==undefined&&d>=1&&d<=31){dia=d;mes=meses[ms];}}
  if(dia===null){const m2=orig.match(/(\d{1,2})[\/\-](\d{1,2})(?:[\/\-](\d{2,4}))?/);if(m2){const d=parseInt(m2[1]),m=parseInt(m2[2])-1;if(d>=1&&d<=31&&m>=0&&m<=11){dia=d;mes=m;if(m2[3]){let y=parseInt(m2[3]);if(y<100)y+=2000;anio=y;}}}}
  if(dia===null){
    // Número solo — pero primero verificar si hay nombre de día con número (ej: "viernes 16")
    const conDia = orig.match(/(?:lunes|martes|miércoles|miercoles|jueves|viernes|sábado|sabado|domingo)\s+(\d{1,2})/);
    if(conDia){
      const d=parseInt(conDia[1]);
      if(d>=1&&d<=31){ dia=d; mes=hoy.getMonth(); if(d<hoy.getDate()){ mes=(mes+1)%12; if(mes===0)anio++; } }
    } else {
      const m3=orig.match(/\b(\d{1,2})\b/);
      if(m3){const d=parseInt(m3[1]);if(d>=1&&d<=31){dia=d;mes=hoy.getMonth();if(d<hoy.getDate()){mes=(mes+1)%12;if(mes===0)anio++;}}}
    }
  }
  if(dia===null||mes===null)return null;
  const f=new Date(anio,mes,dia);if(f.getDate()!==dia||f.getMonth()!==mes)return null;
  if(f<new Date(hoy.getFullYear(),hoy.getMonth(),hoy.getDate()))f.setFullYear(anio+1);
  return `${ds[f.getDay()]} ${dia} de ${mn[mes]}`;
}

}

}

startConversation();
